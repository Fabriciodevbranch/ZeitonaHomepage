<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Zeitona</title>
    <meta name="description" content="Sign in to your Zeitona account." />
    <!-- Load styles -->
    <link rel="stylesheet" href="style.css" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/azeitona3.png" />

    <style>
        /* Login page layout */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 7rem 1.5rem 4rem;
            position: relative;
            overflow: hidden;
        }

        /* Reuse hero blobs for background ambience */
        .login-blob-1 {
            position: absolute;
            top: 10%;
            right: -6rem;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background-color: var(--brand-olive);
            opacity: 0.12;
            filter: blur(90px);
            animation: float 10s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .login-blob-2 {
            position: absolute;
            bottom: 5%;
            left: -6rem;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background-color: var(--brand-forest);
            opacity: 0.2;
            filter: blur(80px);
            animation: float 13s ease-in-out infinite alternate-reverse;
            pointer-events: none;
        }

        /* Login card */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background-color: #ffffff;
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.75rem 2.5rem;
            box-shadow: 0 20px 50px rgba(1, 61, 47, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
        }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
        }

        .login-logo-wrap {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .login-logo {
            height: 2.25rem;
        }

        .login-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background-color: rgba(127, 168, 0, 0.1);
            color: var(--brand-olive);
            border: 1px solid rgba(127, 168, 0, 0.3);
            margin-bottom: 1.25rem;
        }

        .login-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--foreground);
            margin-bottom: 0.4rem;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 300;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Password toggle wrapper */
        .input-password-wrap {
            position: relative;
        }

        .input-password-wrap .form-input {
            padding-right: 2.75rem;
        }

        .btn-toggle-pw {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            display: flex;
            align-items: center;
            padding: 0;
            transition: color 0.2s;
        }

        .btn-toggle-pw:hover { color: var(--foreground); }

        /* Forgot password link */
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--brand-olive);
            margin-top: -0.5rem;
            transition: opacity 0.2s;
        }

        .forgot-link:hover { opacity: 0.75; }

        /* Divider */
        .login-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 0.25rem 0;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border);
        }

        /* Back link */
        .login-back {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 300;
        }

        .login-back a {
            color: var(--brand-olive);
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .login-back a:hover { opacity: 0.75; }

        /* Coming-soon info banner (static-site notice) */
        .login-notice {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            padding: 0.85rem 1rem;
            border-radius: var(--radius);
            background-color: rgba(127, 168, 0, 0.07);
            border: 1px solid rgba(127, 168, 0, 0.2);
            margin-bottom: 1.5rem;
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .login-notice svg {
            flex-shrink: 0;
            color: var(--brand-olive);
            margin-top: 0.1rem;
        }
    </style>
</head>

<body>
    <!-- Nav Placeholder -->
    <div id="header-placeholder"></div>

    <main>
        <div class="login-wrapper">
            <!-- Ambient background blobs -->
            <div class="login-blob-1"></div>
            <div class="login-blob-2"></div>

            <div class="login-card fade-up visible">
                <!-- Logo -->
                <div class="login-logo-wrap">
                    <a href="index.html">
                        <img src="assets/azeitona4.png" alt="Zeitona Logo" class="login-logo" />
                    </a>
                </div>

                <!-- Badge + Heading -->
                <div style="text-align: center; margin-bottom: 1.75rem;">
                    <span class="login-badge">Member Access</span>
                    <h1 class="login-title">Welcome back</h1>
                    <p class="login-subtitle">Sign in to your Zeitona account</p>
                </div>

                <!-- Static-site notice -->
                <div class="login-notice">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4"/>
                        <path d="M12 8h.01"/>
                    </svg>
                    <span>Authentication is not yet active. This page is a preview of the upcoming login experience.</span>
                </div>

                <!-- Login Form -->
                <form class="login-form" id="login-form" novalidate>
                    <!-- Email -->
                    <div class="form-group">
                        <label for="login-email" class="form-label">
                            Email <span class="form-required">*</span>
                        </label>
                        <input
                            type="email"
                            id="login-email"
                            name="email"
                            class="form-input"
                            placeholder="your@email.com"
                            autocomplete="email"
                            required
                        />
                        <span class="form-error" id="login-email-error">Please enter a valid email address.</span>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="login-password" class="form-label">
                            Password <span class="form-required">*</span>
                        </label>
                        <div class="input-password-wrap">
                            <input
                                type="password"
                                id="login-password"
                                name="password"
                                class="form-input"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required
                            />
                            <button type="button" class="btn-toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">
                                <!-- Eye icon (show) -->
                                <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <!-- Eye-off icon (hide) — hidden by default -->
                                <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                    style="display:none;">
                                    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                                    <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                                    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                                    <line x1="2" x2="22" y1="2" y2="22"/>
                                </svg>
                            </button>
                        </div>
                        <span class="form-error" id="login-password-error">Please enter your password.</span>
                    </div>

                    <!-- Forgot password (not yet functional) -->
                    <span class="forgot-link" aria-disabled="true" title="Password reset is not yet available" style="cursor:default; opacity:0.6;">Forgot password?</span>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary btn-lg flex items-center justify-center gap-2"
                        style="width: 100%; margin-top: 0.25rem;">
                        <span>Sign In</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" x2="3" y1="12" y2="12"/>
                        </svg>
                    </button>
                </form>

                <!-- Back to site -->
                <p class="login-back">
                    Not a member yet? <a href="index.html#contact">Request access</a>
                </p>
                <p class="login-back" style="margin-top: 0.5rem;">
                    <a href="index.html">← Back to Homepage</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="i18n.js"></script>
    <script src="script.js?v=4"></script>

    <script>
        window.scrollTo(0, 0);

        // Password show/hide toggle
        (function () {
            var btn = document.getElementById('toggle-pw');
            var input = document.getElementById('login-password');
            var iconEye = document.getElementById('icon-eye');
            var iconEyeOff = document.getElementById('icon-eye-off');

            if (btn && input) {
                btn.addEventListener('click', function () {
                    var isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    iconEye.style.display = isPassword ? 'none' : '';
                    iconEyeOff.style.display = isPassword ? '' : 'none';
                    btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
                });
            }
        })();

        // Basic client-side validation (no submission — static site)
        (function () {
            var form = document.getElementById('login-form');
            if (!form) return;

            var emailInput    = document.getElementById('login-email');
            var passwordInput = document.getElementById('login-password');
            var emailError    = document.getElementById('login-email-error');
            var passwordError = document.getElementById('login-password-error');

            [emailInput, passwordInput].forEach(function (input) {
                input.addEventListener('input', function () {
                    input.classList.remove('input-error');
                    var err = input.id === 'login-email' ? emailError : passwordError;
                    if (err) err.classList.remove('show');
                });
            });

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var valid = true;

                var emailVal = emailInput.value.trim();
                var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailVal || !emailRegex.test(emailVal)) {
                    emailInput.classList.add('input-error');
                    emailError.classList.add('show');
                    valid = false;
                }

                if (!passwordInput.value) {
                    passwordInput.classList.add('input-error');
                    passwordError.classList.add('show');
                    valid = false;
                }

                if (!valid) return;

                // Static site — show friendly coming-soon alert
                var submitBtn = form.querySelector('button[type="submit"]');
                var original = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Coming Soon <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>';

                setTimeout(function () {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = original;
                }, 2500);
            });
        })();
    </script>
</body>

</html>
